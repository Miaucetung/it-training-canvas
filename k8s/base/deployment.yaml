apiVersion: apps/v1
kind: Deployment
metadata:
  name: it-training-canvas
  namespace: apps
  labels:
    app.kubernetes.io/name: it-training-canvas
    app.kubernetes.io/part-of: homelab-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: it-training-canvas
  template:
    metadata:
      labels:
        app: it-training-canvas
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: app
          image: ghcr.io/miaucetung/it-training-canvas:main
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
